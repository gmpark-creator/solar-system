<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: #01010a; overflow: hidden;
    font-family: "Pretendard", "Malgun Gothic", system-ui, sans-serif; color: #e8ecf4; }
  canvas { display: block; }

  /* ===== 좌상단 정보 패널 (HUD) ===== */
  #hud {
    position: fixed; top: 14px; left: 14px; z-index: 10;
    background: rgba(8, 12, 26, 0.72); border: 1px solid rgba(120, 160, 240, 0.22);
    border-radius: 12px; padding: 14px 16px; backdrop-filter: blur(8px);
    min-width: 248px; font-size: 13px; line-height: 1.45;
  }
  #hud h1 { margin: 0 0 8px; font-size: 14px; letter-spacing: .3px;
    color: #9ec3ff; font-weight: 700; }
  #hud .row { display: flex; justify-content: space-between; gap: 12px; padding: 2px 0; }
  #hud .row .k { color: #8b97b4; }
  #hud .row .v { color: #f2f5ff; font-variant-numeric: tabular-nums; text-align: right; }
  #hud .sep { height: 1px; background: rgba(120,160,240,.16); margin: 7px 0; }

  /* ===== 하단 컨트롤 바 ===== */
  #controls {
    position: fixed; left: 50%; bottom: 16px; transform: translateX(-50%); z-index: 10;
    display: flex; flex-wrap: wrap; justify-content: center; gap: 6px;
    background: rgba(8, 12, 26, 0.72); border: 1px solid rgba(120, 160, 240, 0.22);
    border-radius: 14px; padding: 8px 10px; backdrop-filter: blur(8px); max-width: 96vw;
  }
  #controls button {
    background: rgba(40, 56, 104, 0.55); color: #e8ecf4;
    border: 1px solid rgba(130, 165, 240, 0.28); border-radius: 9px;
    padding: 7px 11px; font-size: 12.5px; cursor: pointer; white-space: nowrap;
    font-family: inherit; transition: background .12s, border-color .12s;
  }
  #controls button:hover { background: rgba(70, 96, 168, 0.75); border-color: #9ec3ff; }
  #controls button.on { background: #2f6bd8; border-color: #9ec3ff; }
  #controls .div { width: 1px; align-self: stretch; background: rgba(120,160,240,.22); margin: 2px 4px; }

  #hint {
    position: fixed; right: 14px; bottom: 14px; z-index: 10; font-size: 11.5px;
    color: #6f7c9c; text-align: right; line-height: 1.5; pointer-events: none;
  }

  /* ===== 로딩 / 오류 오버레이 ===== */
  #loading {
    position: fixed; inset: 0; z-index: 50; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px;
    background: #01010a; text-align: center; padding: 24px;
  }
  #loading .spinner {
    width: 42px; height: 42px; border-radius: 50%;
    border: 3px solid rgba(120,160,240,.25); border-top-color: #9ec3ff;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loading p { margin: 0; color: #c7d2ec; }
  #loading .sub { font-size: 12px; color: #6f7c9c; max-width: 380px; }
  #loading.error .spinner { display: none; }

<!-- Three.js — CDN ES Module (인터넷 필요) -->
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ============================================================
   태양계 프로젝트 · Step 1
   - 태양(중심) / 지구(실시간 자전·공전) / 달(실시간 공전)
   - 천체 위치는 실제 현재 시각 기반 (Schlyter 궤도력 + 달 섭동항)
   ★ 지구-달 상대위치·공전주기를 실제 시간과 정밀히 맞물리게 계산
     → 추후 조석(물때표) 계산 확장의 토대
   ============================================================ */

try {

// ---------- 상수 ----------
const DEG = Math.PI / 180, RAD = 180 / Math.PI;
const AU_KM = 149597870.7;        // 1 천문단위(km)
const EARTH_RADIUS_KM = 6371.0;   // 지구 평균반지름(km)
const SUN_RADIUS_KM = 696340.0;
const MOON_RADIUS_KM = 1737.4;
const OBLIQUITY = 23.4393;        // 황도경사각(지구 자전축 기울기, deg)
const ORIGIN = new THREE.Vector3(0, 0, 0);

// 스케일 프리셋 — [시각화 최적화] vs [실제 비율]
const SCALES = {
  visual: {  // 보기 좋게 보정: 행성을 키우고 달 궤도를 넓힘
    auToUnits: 100,        // 1 AU → 100 단위 (지구 공전반지름 ≈ 100)
    sunRadius: 9,
    earthRadius: 2.4,
    moonRadius: 0.95,
    moonDistFactor: 0.30   // 달 지심거리(지구반지름 단위) → 화면 단위
  },
  real: {    // 실제 비율 그대로 (지구는 점처럼 보임 — 의도된 비교용)
    auToUnits: 100,
    sunRadius: SUN_RADIUS_KM / AU_KM * 100,
    earthRadius: EARTH_RADIUS_KM / AU_KM * 100,
    moonRadius: MOON_RADIUS_KM / AU_KM * 100,
    moonDistFactor: EARTH_RADIUS_KM / AU_KM * 100
  }
};

// ---------- 천문 계산 헬퍼 ----------
const rev = x => { x %= 360; return x < 0 ? x + 360 : x; };
const sind = x => Math.sin(x * DEG);
const cosd = x => Math.cos(x * DEG);
const atan2d = (y, x) => Math.atan2(y, x) * RAD;
const acosd = x => Math.acos(Math.min(1, Math.max(-1, x))) * RAD;

// 기준 시각(2000 Jan 0.0 UT = 1999-12-31 00:00 UT)으로부터의 경과일수 d
const EPOCH = Date.UTC(1999, 11, 31, 0, 0, 0);
const dayNumber = date => (date.getTime() - EPOCH) / 86400000;

// 태양(= 지구 공전) — 지심 황도좌표
function sunPosition(d) {
  const w = 282.9404 + 4.70935e-5 * d;        // 근일점 황경
  const e = 0.016709 - 1.151e-9 * d;          // 이심률
  const M = rev(356.0470 + 0.9856002585 * d); // 평균근점이각
  const E = M + RAD * e * sind(M) * (1 + e * cosd(M)); // 이심근점이각(태양은 1회 근사로 충분)
  const xv = cosd(E) - e;
  const yv = Math.sqrt(1 - e * e) * sind(E);
  const v = atan2d(yv, xv);                   // 진근점이각
  const r = Math.sqrt(xv * xv + yv * yv);     // 거리(AU)
  return { lon: rev(v + w), r, M, w: rev(w), L: rev(M + w) };
}

// 달 — 지심 황도좌표 (단위: 지구반지름). 섭동항으로 정밀도 ↑
function moonPosition(d, sun) {
  const N = rev(125.1228 - 0.0529538083 * d); // 승교점 황경
  const i = 5.1454;                           // 궤도 경사
  const w = rev(318.0634 + 0.1643573223 * d); // 근지점 인수
  const a = 60.2666;                          // 평균거리(지구반지름)
  const e = 0.054900;                         // 이심률
  const M = rev(115.3654 + 13.0649929509 * d);// 평균근점이각

  // 케플러 방정식 반복 풀이 (달은 이심률이 커서 반복 필요)
  let E = M + RAD * e * sind(M) * (1 + e * cosd(M));
  for (let k = 0; k < 8; k++) {
    const dE = (E - RAD * e * sind(E) - M) / (1 - e * cosd(E));
    E -= dE;
    if (Math.abs(dE) < 1e-7) break;
  }
  const xv = a * (cosd(E) - e);
  const yv = a * Math.sqrt(1 - e * e) * sind(E);
  const v = atan2d(yv, xv);
  const r = Math.sqrt(xv * xv + yv * yv);

  // 궤도면 → 황도 3D 좌표
  const xh = r * (cosd(N) * cosd(v + w) - sind(N) * sind(v + w) * cosd(i));
  const yh = r * (sind(N) * cosd(v + w) + cosd(N) * sind(v + w) * cosd(i));
  const zh = r * (sind(v + w) * sind(i));
  let lon = atan2d(yh, xh);
  let lat = atan2d(zh, Math.sqrt(xh * xh + yh * yh));

  // 섭동(perturbations) — 태양 중력 등에 의한 보정 (정밀도 ~2′)
  const Ls = sun.L, Ms = sun.M;
  const Lm = rev(N + w + M), Mm = M;
  const Dm = rev(Lm - Ls);   // 달의 이각(elongation)
  const F = rev(Lm - N);     // 위도 인수
  lon += -1.274 * sind(Mm - 2 * Dm)      // 출차(evection)
       + 0.658 * sind(2 * Dm)            // 이균차(variation)
       - 0.186 * sind(Ms)                // 연차(yearly equation)
       - 0.059 * sind(2 * Mm - 2 * Dm)
       - 0.057 * sind(Mm - 2 * Dm + Ms)
       + 0.053 * sind(Mm + 2 * Dm)
       + 0.046 * sind(2 * Dm - Ms)
       + 0.041 * sind(Mm - Ms)
       - 0.035 * sind(Dm)                // 시차 부등
       - 0.031 * sind(Mm + Ms)
       - 0.015 * sind(2 * F - 2 * Dm)
       + 0.011 * sind(Mm - 4 * Dm);
  lat += -0.173 * sind(F - 2 * Dm)
       - 0.055 * sind(Mm - F - 2 * Dm)
       - 0.046 * sind(Mm + F - 2 * Dm)
       + 0.033 * sind(F + 2 * Dm)
       + 0.017 * sind(2 * Mm + F);
  const rm = r - 0.58 * cosd(Mm - 2 * Dm) - 0.46 * cosd(2 * Dm);

  return {
    x: rm * cosd(lon) * cosd(lat),
    y: rm * sind(lon) * cosd(lat),
    z: rm * sind(lat),
    lon: rev(lon), lat, r: rm
  };
}

// 지구 자전각 — 그리니치 평균 항성시(GMST) 기반 → 1 항성일에 1회전
function earthRotation(date, sun) {
  const ut = date.getUTCHours() + date.getUTCMinutes() / 60
           + date.getUTCSeconds() / 3600 + date.getUTCMilliseconds() / 3.6e6;
  return rev(sun.L + 180 + ut * 15);
}

// 달 위상 이름
function moonPhaseName(a) {
  const t = [[22.5, '삭(신월)'], [67.5, '초승달'], [112.5, '상현달'],
            [157.5, '차오르는 달'], [202.5, '보름달(망)'], [247.5, '기우는 달'],
            [292.5, '하현달'], [337.5, '그믐달']];
  for (const [lim, nm] of t) if (a < lim) return nm;
  return '삭(신월)';
}

// 특정 시각의 전체 상태 계산
function computeState(date) {
  const d = dayNumber(date);
  const sun = sunPosition(d);
  const moon = moonPosition(d, sun);
  // 지구 일심좌표(태양 기준) = 태양 지심좌표의 반대 / 황도좌표 → Three.js (x,z,-y)
  const earthPos = new THREE.Vector3(-sun.r * cosd(sun.lon), 0, sun.r * sind(sun.lon));
  const moonPos = new THREE.Vector3(moon.x, moon.z, -moon.y);
  const phaseAngle = rev(moon.lon - sun.lon);
  return {
    date, earthPos, moonPos,
    rotDeg: earthRotation(date, sun),
    illum: (1 - cosd(phaseAngle)) / 2,
    phaseName: moonPhaseName(phaseAngle),
    earthMoonKm: moon.r * EARTH_RADIUS_KM,
    earthSunKm: sun.r * AU_KM
  };
}

// ---------- 렌더러 / 씬 / 카메라 ----------
const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x01010a);

const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 60000);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.enablePan = false;
controls.rotateSpeed = 0.8;
controls.zoomSpeed = 0.9;
controls.minDistance = 0.05;
controls.maxDistance = 45000;

// ---------- 조명 ----------
const sunLight = new THREE.PointLight(0xfff2da, 2.6, 0, 0); // decay 0 = 거리감쇠 없음
scene.add(sunLight);                                        // 원점(태양)에 위치
scene.add(new THREE.AmbientLight(0x2a3358, 0.16));          // 밤면이 완전 암흑이 되지 않게

// ---------- 절차적 텍스처 (외부 이미지 의존 없음) ----------
function makeEarthTexture() {
  const w = 1024, h = 512, c = document.createElement('canvas');
  c.width = w; c.height = h; const x = c.getContext('2d');
  const g = x.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, '#0a2a55'); g.addColorStop(.5, '#13458a'); g.addColorStop(1, '#0a2a55');
  x.fillStyle = g; x.fillRect(0, 0, w, h);
  const greens = ['#2f6b34', '#3c7d3f', '#4f8a45', '#6b7d3a', '#7a6a3c'];
  for (let k = 0; k < 13; k++) {                 // 대륙 — 무작위 덩어리
    const cx = Math.random() * w, cy = h * .18 + Math.random() * h * .64;
    const blobs = 10 + (Math.random() * 16 | 0);
    for (let b = 0; b < blobs; b++) {
      const a = Math.random() * 6.283, dist = Math.random() * 70;
      x.fillStyle = greens[Math.random() * greens.length | 0];
      x.beginPath();
      x.ellipse(cx + Math.cos(a) * dist, cy + Math.sin(a) * dist * .7,
        14 + Math.random() * 34, (14 + Math.random() * 34) * (.6 + Math.random() * .6),
        Math.random() * 3.14, 0, 6.283);
      x.fill();
    }
  }
  x.fillStyle = 'rgba(238,244,255,.92)';         // 극관
  x.beginPath(); x.ellipse(w / 2, 0, w, 40, 0, 0, 6.283); x.fill();
  x.beginPath(); x.ellipse(w / 2, h, w, 40, 0, 0, 6.283); x.fill();
  x.fillStyle = 'rgba(255,255,255,.13)';         // 옅은 구름
  for (let k = 0; k < 40; k++) {
    x.beginPath();
    x.ellipse(Math.random() * w, Math.random() * h,
      20 + Math.random() * 60, 8 + Math.random() * 22, 0, 0, 6.283);
    x.fill();
  }
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
}

function makeMoonTexture() {
  const w = 1024, h = 512, c = document.createElement('canvas');
  c.width = w; c.height = h; const x = c.getContext('2d');
  x.fillStyle = '#9a978f'; x.fillRect(0, 0, w, h);
  for (let k = 0; k < 7; k++) {                  // 달의 바다(어두운 패치)
    const cx = Math.random() * w, cy = Math.random() * h, r = 40 + Math.random() * 90;
    const g = x.createRadialGradient(cx, cy, 0, cx, cy, r);
    g.addColorStop(0, 'rgba(75,73,70,.85)'); g.addColorStop(1, 'rgba(75,73,70,0)');
    x.fillStyle = g; x.beginPath(); x.arc(cx, cy, r, 0, 6.283); x.fill();
  }
  for (let k = 0; k < 90; k++) {                 // 크레이터
    const cx = Math.random() * w, cy = Math.random() * h, r = 2 + Math.random() * 15;
    x.fillStyle = 'rgba(120,117,110,.7)'; x.beginPath(); x.arc(cx, cy, r, 0, 6.283); x.fill();
    x.strokeStyle = 'rgba(225,222,214,.5)'; x.lineWidth = 1;
    x.beginPath(); x.arc(cx, cy, r, 0, 6.283); x.stroke();
  }
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
}

function makeSunTexture() {
  const w = 1024, h = 512, c = document.createElement('canvas');
  c.width = w; c.height = h; const x = c.getContext('2d');
  x.fillStyle = '#ff7714'; x.fillRect(0, 0, w, h);
  for (let k = 0; k < 340; k++) {                // 플라스마 얼룩
    const cx = Math.random() * w, cy = Math.random() * h, r = 8 + Math.random() * 46;
    const col = Math.random() > .5 ? '255,214,90' : '226,70,8';
    const g = x.createRadialGradient(cx, cy, 0, cx, cy, r);
    g.addColorStop(0, `rgba(${col},.55)`); g.addColorStop(1, `rgba(${col},0)`);
    x.fillStyle = g; x.beginPath(); x.arc(cx, cy, r, 0, 6.283); x.fill();
  }
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
}

function makeGlowTexture() {
  const s = 256, c = document.createElement('canvas');
  c.width = c.height = s; const x = c.getContext('2d');
  const g = x.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
  g.addColorStop(0, 'rgba(255,230,150,.9)');
  g.addColorStop(.25, 'rgba(255,170,60,.45)');
  g.addColorStop(.6, 'rgba(255,120,30,.12)');
  g.addColorStop(1, 'rgba(255,120,30,0)');
  x.fillStyle = g; x.fillRect(0, 0, s, s);
  const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; return t;
}

// ---------- 별 배경(우주 공간) ----------
function makeStars() {
  const N = 9000, R = 12000;
  const pos = new Float32Array(N * 3), col = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const u = Math.random() * 2 - 1, th = Math.random() * 6.283;
    const rr = Math.sqrt(1 - u * u);
    pos[i * 3] = R * rr * Math.cos(th);
    pos[i * 3 + 1] = R * u;
    pos[i * 3 + 2] = R * rr * Math.sin(th);
    const b = 0.6 + Math.random() * 0.4, tint = Math.random();
    let r = b, g = b, bl = b;
    if (tint < 0.15) { g = b * 0.85; bl = b * 0.7; }       // 노란 별
    else if (tint < 0.3) { r = b * 0.7; g = b * 0.82; }    // 푸른 별
    col[i * 3] = r; col[i * 3 + 1] = g; col[i * 3 + 2] = bl;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  return new THREE.Points(geo, new THREE.PointsMaterial({
    size: 1.6, sizeAttenuation: false, vertexColors: true, transparent: true
  }));
}
scene.add(makeStars());

// ---------- 천체 (반지름 1 구체 + scale 로 크기 조절) ----------
// 태양
const sunMesh = new THREE.Mesh(
  new THREE.SphereGeometry(1, 48, 32),
  new THREE.MeshBasicMaterial({ map: makeSunTexture() })   // 항상 밝게(빛 영향 X)
);
scene.add(sunMesh);
const glow = new THREE.Sprite(new THREE.SpriteMaterial({
  map: makeGlowTexture(), blending: THREE.AdditiveBlending,
  transparent: true, depthWrite: false
}));
scene.add(glow);

// 지구 시스템: earthSystem(이동만) > earthTilt(자전축 23.4° 고정) > earthMesh(자전)
const earthSystem = new THREE.Group();
scene.add(earthSystem);
const earthTilt = new THREE.Group();
earthTilt.rotation.z = OBLIQUITY * DEG;        // 자전축 기울기 — 우주공간에 고정 → 계절 발생
earthSystem.add(earthTilt);
const earthMesh = new THREE.Mesh(
  new THREE.SphereGeometry(1, 64, 48),
  new THREE.MeshStandardMaterial({ map: makeEarthTexture(), roughness: 1, metalness: 0 })
);
earthTilt.add(earthMesh);
const atmo = new THREE.Mesh(                    // 옅은 대기 띠
  new THREE.SphereGeometry(1, 48, 32),
  new THREE.MeshBasicMaterial({
    color: 0x5b9bff, transparent: true, opacity: 0.16,
    side: THREE.BackSide, blending: THREE.AdditiveBlending, depthWrite: false
  })
);
earthTilt.add(atmo);
const axisLine = new THREE.Line(                // 자전축 표시선
  new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(0, -1.9, 0), new THREE.Vector3(0, 1.9, 0)]),
  new THREE.LineBasicMaterial({ color: 0x66ccff, transparent: true, opacity: 0.55 })
);
earthTilt.add(axisLine);

// 달 (지구 시스템의 자식 — 지구 자전축/자전의 영향을 받지 않음)
const moonMesh = new THREE.Mesh(
  new THREE.SphereGeometry(1, 48, 32),
  new THREE.MeshStandardMaterial({ map: makeMoonTexture(), roughness: 1, metalness: 0 })
);
earthSystem.add(moonMesh);

// ---------- 궤도선 ----------
function orbitLine(points, color) {
  return new THREE.LineLoop(
    new THREE.BufferGeometry().setFromPoints(points),
    new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.5 })
  );
}
// 지구 공전궤도(태양 기준, AU 단위 원시좌표) — 그룹 scale 로 화면단위 변환
function buildEarthOrbit(d0) {
  const pts = [];
  for (let i = 0; i <= 360; i++) {
    const s = sunPosition(d0 + i / 360 * 365.2564);  // 1 항성년
    pts.push(new THREE.Vector3(-s.r * cosd(s.lon), 0, s.r * sind(s.lon)));
  }
  return pts;
}
// 달 공전궤도(지구 기준, 지구반지름 단위 원시좌표)
function buildMoonOrbit(d0) {
  const pts = [];
  for (let i = 0; i <= 360; i++) {
    const dd = d0 + i / 360 * 27.32166;              // 1 항성월
    const m = moonPosition(dd, sunPosition(dd));
    pts.push(new THREE.Vector3(m.x, m.z, -m.y));
  }
  return pts;
}
const d0 = dayNumber(new Date());
const earthOrbitGroup = new THREE.Group();
earthOrbitGroup.add(orbitLine(buildEarthOrbit(d0), 0x4477aa));
scene.add(earthOrbitGroup);
const moonOrbitGroup = new THREE.Group();
moonOrbitGroup.add(orbitLine(buildMoonOrbit(d0), 0x8a8a9c));
earthSystem.add(moonOrbitGroup);

// ---------- 상태 / 모드 ----------
let scaleMode = 'visual';
let orbitsVisible = true;
let paused = false;
let focusName = 'earth';
let simTime = Date.now();                        // 모의 시각(ms) — 1배속이면 실제시간과 동일
const SPEEDS = [-604800, -86400, -21600, -3600, -600, -60, -10, -1,
                1, 10, 60, 600, 3600, 21600, 86400, 604800];
let speedIndex = SPEEDS.indexOf(1);
const prevFocus = new THREE.Vector3();

// 스케일 적용
function applyScale() {
  const S = SCALES[scaleMode];
  sunMesh.scale.setScalar(S.sunRadius);
  glow.scale.setScalar(S.sunRadius * 4.2);
  earthMesh.scale.setScalar(S.earthRadius);
  atmo.scale.setScalar(S.earthRadius * 1.18);
  axisLine.scale.setScalar(S.earthRadius);
  moonMesh.scale.setScalar(S.moonRadius);
  earthOrbitGroup.scale.setScalar(S.auToUnits);
  moonOrbitGroup.scale.setScalar(S.moonDistFactor);
}

// 매 프레임 씬 갱신
function updateScene(st) {
  const S = SCALES[scaleMode];
  earthSystem.position.copy(st.earthPos).multiplyScalar(S.auToUnits);
  moonMesh.position.copy(st.moonPos).multiplyScalar(S.moonDistFactor);
  earthMesh.rotation.y = st.rotDeg * DEG;                 // 실시간 자전
  moonMesh.lookAt(earthSystem.position);                 // 조석 고정(달은 늘 같은 면이 지구를 향함)
}

// 카메라 시점 구성
function frameView() {
  const S = SCALES[scaleMode];
  if (focusName === 'sun') {
    const r = S.auToUnits;
    controls.target.set(0, 0, 0);
    camera.position.set(r * 0.45, r * 0.85, r * 1.9);
    prevFocus.set(0, 0, 0);
  } else {
    const p = earthSystem.position;
    const r = Math.max(S.moonDistFactor * 64, S.earthRadius * 9, 12);
    controls.target.copy(p);
    camera.position.set(p.x + r * 0.35, p.y + r * 0.55, p.z + r * 1.5);
    prevFocus.copy(p);
  }
}

// ---------- HUD ----------
const $ = id => document.getElementById(id);
function speedLabel(v) {
  const a = Math.abs(v);
  let s;
  if (a === 1) s = '실시간 (1×)';
  else if (a < 60) s = a + '×';
  else if (a < 3600) s = (a / 60) + '분/초';
  else if (a < 86400) s = (a / 3600) + '시간/초';
  else if (a < 604800) s = (a / 86400) + '일/초';
  else s = (a / 604800) + '주/초';
  return (v < 0 ? '◀역행 ' : '') + s;
}
let lastHud = 0;
function updateHUD(st, now) {
  if (now - lastHud < 120) return;
  lastHud = now;
  $('hudLocal').textContent = st.date.toLocaleString('ko-KR',
    { dateStyle: 'medium', timeStyle: 'medium' });
  $('hudUTC').textContent = st.date.toISOString().replace('T', ' ').slice(0, 19);
  $('hudSpeed').textContent = paused ? '⏸ 일시정지' : speedLabel(SPEEDS[speedIndex]);
  $('hudRot').textContent = st.rotDeg.toFixed(1) + '°';
  $('hudPhase').textContent = st.phaseName + ' · ' + Math.round(st.illum * 100) + '%';
  $('hudEM').textContent = Math.round(st.earthMoonKm).toLocaleString('ko-KR') + ' km';
  $('hudES').textContent = Math.round(st.earthSunKm).toLocaleString('ko-KR') + ' km';
}

// ---------- UI 동작 ----------
function changeSpeed(dir) {
  speedIndex = Math.min(SPEEDS.length - 1, Math.max(0, speedIndex + dir));
}
function togglePause() {
  paused = !paused;
  $('btnPause').textContent = paused ? '▶ 재생' : '⏸ 정지';
  $('btnPause').classList.toggle('on', paused);
}
$('btnSlower').onclick = () => changeSpeed(-1);
$('btnFaster').onclick = () => changeSpeed(1);
$('btnPause').onclick = togglePause;
$('btnRealtime').onclick = () => { speedIndex = SPEEDS.indexOf(1); };
$('btnNow').onclick = () => {
  simTime = Date.now();
  speedIndex = SPEEDS.indexOf(1);
  if (paused) togglePause();
};
$('btnFocusEarth').onclick = () => {
  focusName = 'earth'; frameView();
  $('btnFocusEarth').classList.add('on');
  $('btnFocusSun').classList.remove('on');
};
$('btnFocusSun').onclick = () => {
  focusName = 'sun'; frameView();
  $('btnFocusSun').classList.add('on');
  $('btnFocusEarth').classList.remove('on');
};
$('btnScale').onclick = () => {
  scaleMode = scaleMode === 'visual' ? 'real' : 'visual';
  applyScale(); frameView();
  $('btnScale').textContent = scaleMode === 'visual' ? '📐 시각화 모드' : '📐 실제 비율';
};
$('btnOrbit').onclick = () => {
  orbitsVisible = !orbitsVisible;
  earthOrbitGroup.visible = moonOrbitGroup.visible = orbitsVisible;
  $('btnOrbit').textContent = orbitsVisible ? '🛰 궤도 켬' : '🛰 궤도 끔';
  $('btnOrbit').classList.toggle('on', orbitsVisible);
};
$('btnView').onclick = frameView;
addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); togglePause(); }
  else if (e.code === 'ArrowRight') changeSpeed(1);
  else if (e.code === 'ArrowLeft') changeSpeed(-1);
  else if (e.key === 'r' || e.key === 'R') frameView();
});
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---------- 초기화 & 애니메이션 ----------
applyScale();
updateScene(computeState(new Date(simTime)));
focusName = 'earth';
frameView();
$('btnFocusEarth').classList.add('on');
$('btnOrbit').classList.add('on');

let prevT = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  let dt = (now - prevT) / 1000;
  prevT = now;
  if (dt > 0.1) dt = 0.1;                          // 탭 비활성 후 점프 방지

  if (!paused) simTime += dt * 1000 * SPEEDS[speedIndex];

  const st = computeState(new Date(simTime));
  updateScene(st);

  // 카메라가 초점 천체를 따라가도록 (고배속에서도 시야 유지)
  const fp = focusName === 'sun' ? ORIGIN : earthSystem.position;
  const move = fp.clone().sub(prevFocus);
  camera.position.add(move);
  controls.target.add(move);
  prevFocus.copy(fp);

  controls.update();
  renderer.render(scene, camera);
  updateHUD(st, now);
}

$('loading').remove();
animate();

} catch (err) {
  // 초기화 실패 시(주로 CDN 로드 실패) 사용자에게 안내
  const el = document.getElementById('loading');
  if (el) {
    el.classList.add('error');
    el.innerHTML = '<p>⚠ 실행에 실패했습니다.</p>'
      + '<p class="sub">' + (err && err.message ? err.message : err) + '</p>'
      + '<p class="sub">인터넷 연결을 확인하거나, 로컬 서버로 열어보세요.</p>';
  }
  console.error(err);
}
</script>
</body>
</html>
