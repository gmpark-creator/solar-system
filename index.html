<style>

{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

/* ============================================================
   태양계 프로젝트 · Step 2
   - 태양 + 8행성(수성~해왕성) + 달
   - 실제 현재 시각 기반 천체력 (Keplerian Elements, Schlyter 궤도력)
   - 행성별 공전주기·거리순서 고증 / 토성 고리 / 궤도 가이드선
   - 지구: NASA 실측 텍스처(낮·지형·구름·야간불빛)로 고품질화
   ============================================================ */
try {

// ---------- 상수 ----------
const DEG = Math.PI / 180, RAD = 180 / Math.PI;
const AU_KM = 149597870.7;
const EARTH_RADIUS_KM = 6371.0, SUN_RADIUS_KM = 696340.0, MOON_RADIUS_KM = 1737.4;
const ORIGIN = new THREE.Vector3(0, 0, 0);

// 화면 스케일 — 크기는 항상 '시각화' 값, 거리만 모드에 따라 토글
const AU_UNITS = 70;        // 1 AU 기준 화면단위
const DIST_POW = 0.6;       // 시각화 모드의 거리 압축 지수(거리 순서 유지, 외행성 압축)
const MOON_DIST_FACTOR = 0.32;  // 달 지심거리(지구반지름) → 화면단위 (가시성 위해 항상 과장)
const SUN_RADIUS = 12;

// 텍스처 CDN (NASA 기반 — three.js 저장소 미러)
const TEXBASE = 'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r160/examples/textures/planets/';
const TEX = {
  earthDay: TEXBASE + 'earth_atmos_2048.jpg',
  earthNormal: TEXBASE + 'earth_normal_2048.jpg',
  earthClouds: TEXBASE + 'earth_clouds_1024.png',
  earthLights: TEXBASE + 'earth_lights_2048.png',
  moon: TEXBASE + 'moon_1024.jpg'
};

// ---------- 행성 데이터 (Keplerian 궤도요소 · 2000.0 기준, [기준값, 1일당 변화율]) ----------
const PLANETS = [
  { key:'mercury', name:'수성', style:'rocky', color:0x9a8c7d, vRadius:0.95, rotH:1407.6, tilt:0.03,
    el:{ N:[48.3313,3.24587e-5], i:[7.0047,5.00e-8], w:[29.1241,1.01444e-5],
         a:[0.387098,0], e:[0.205635,5.59e-10], M:[168.6562,4.0923344368] } },
  { key:'venus', name:'금성', style:'rocky', color:0xe3d2a8, vRadius:2.15, rotH:-5832.5, tilt:177.4,
    el:{ N:[76.6799,2.46590e-5], i:[3.3946,2.75e-8], w:[54.8910,1.38374e-5],
         a:[0.723330,0], e:[0.006773,-1.302e-9], M:[48.0052,1.6021302244] } },
  { key:'earth', name:'지구', style:'earth', color:0x2a4a8a, vRadius:2.3, rotH:23.9345, tilt:23.44,
    el:{ N:[0,0], i:[0,0], w:[102.9404,4.70935e-5],
         a:[1.000000,0], e:[0.016709,-1.151e-9], M:[356.0470,0.9856002585] } },
  { key:'mars', name:'화성', style:'rocky', color:0xc15a33, vRadius:1.35, rotH:24.6229, tilt:25.19,
    el:{ N:[49.5574,2.11081e-5], i:[1.8497,-1.78e-8], w:[286.5016,2.92961e-5],
         a:[1.523688,0], e:[0.093405,2.516e-9], M:[18.6021,0.5240207766] } },
  { key:'jupiter', name:'목성', style:'gas', vRadius:7.6, rotH:9.925, tilt:3.13, redSpot:true,
    palette:['#c9a87c','#e3cda6','#a8794f','#d8bf99','#8a5f3c','#ead9c0'],
    el:{ N:[100.4542,2.76854e-5], i:[1.3030,-1.557e-7], w:[273.8777,1.64505e-5],
         a:[5.20256,0], e:[0.048498,4.469e-9], M:[19.8950,0.0830853001] } },
  { key:'saturn', name:'토성', style:'gas', vRadius:6.4, rotH:10.656, tilt:26.73, ring:true,
    palette:['#e8dab0','#f2e8cc','#d2bd8e','#ece0bd','#dccba0'],
    el:{ N:[113.6634,2.38980e-5], i:[2.4886,-1.081e-7], w:[339.3939,2.97661e-5],
         a:[9.55475,0], e:[0.055546,-9.499e-9], M:[316.9670,0.0334442282] } },
  { key:'uranus', name:'천왕성', style:'gas', vRadius:4.1, rotH:-17.24, tilt:97.77,
    palette:['#aee0e6','#c8eef2','#93d2da','#bae8ec'],
    el:{ N:[74.0005,1.3978e-5], i:[0.7733,1.90e-8], w:[96.6612,3.0565e-5],
         a:[19.18171,-1.55e-8], e:[0.047318,7.45e-9], M:[142.5905,0.011725806] } },
  { key:'neptune', name:'해왕성', style:'gas', vRadius:4.0, rotH:16.11, tilt:28.32,
    palette:['#3a5fcc','#5278e6','#2c49a8','#6b90f0'],
    el:{ N:[131.7806,3.0173e-5], i:[1.7700,-2.55e-7], w:[272.8461,-6.027e-6],
         a:[30.05826,3.313e-8], e:[0.008606,2.15e-9], M:[260.2471,0.005995147] } }
];
const EARTH = PLANETS.find(p => p.key === 'earth');
// 공전주기 사전 계산 (M의 1일당 변화율로부터 → 실제값과 일치)
for (const P of PLANETS) {
  P.periodDays = 360 / P.el.M[1];
  P.periodYears = P.periodDays / 365.25;
}

// ---------- 천문 계산 ----------
const rev = x => { x %= 360; return x < 0 ? x + 360 : x; };
const sind = x => Math.sin(x * DEG), cosd = x => Math.cos(x * DEG);
const atan2d = (y, x) => Math.atan2(y, x) * RAD;
const EPOCH = Date.UTC(1999, 11, 31, 0, 0, 0);
const dayNumber = date => (date.getTime() - EPOCH) / 86400000;

// 케플러 궤도요소 → 일심(태양중심) 황도 직교좌표 (AU)
function planetHelio(d, P) {
  const el = P.el;
  const N = el.N[0] + el.N[1] * d, i = el.i[0] + el.i[1] * d, w = el.w[0] + el.w[1] * d;
  const a = el.a[0] + el.a[1] * d, e = el.e[0] + el.e[1] * d;
  const M = rev(el.M[0] + el.M[1] * d);
  // 케플러 방정식 풀이
  let E = M + RAD * e * sind(M) * (1 + e * cosd(M));
  for (let k = 0; k < 8; k++) {
    const dE = (E - RAD * e * sind(E) - M) / (1 - e * cosd(E));
    E -= dE; if (Math.abs(dE) < 1e-7) break;
  }
  const xv = a * (cosd(E) - e), yv = a * Math.sqrt(1 - e * e) * sind(E);
  const v = atan2d(yv, xv), r = Math.sqrt(xv * xv + yv * yv);
  const xh = r * (cosd(N) * cosd(v + w) - sind(N) * sind(v + w) * cosd(i));
  const yh = r * (sind(N) * cosd(v + w) + cosd(N) * sind(v + w) * cosd(i));
  const zh = r * (sind(v + w) * sind(i));
  return { xh, yh, zh, r, M, w, lon: rev(atan2d(yh, xh)) };
}

// 태양의 평균황경·평균근점이각 (달 섭동 + 지구 자전 계산용)
function sunLM(d) {
  const eh = planetHelio(d, EARTH);
  return { M: eh.M, L: rev(eh.M + eh.w + 180) };
}

// 달 — 지심 황도좌표(지구반지름 단위) + 섭동항 12개 (Schlyter)
function moonPosition(d, sun) {
  const N = rev(125.1228 - 0.0529538083 * d), i = 5.1454;
  const w = rev(318.0634 + 0.1643573223 * d), a = 60.2666, e = 0.054900;
  const M = rev(115.3654 + 13.0649929509 * d);
  let E = M + RAD * e * sind(M) * (1 + e * cosd(M));
  for (let k = 0; k < 8; k++) {
    const dE = (E - RAD * e * sind(E) - M) / (1 - e * cosd(E));
    E -= dE; if (Math.abs(dE) < 1e-7) break;
  }
  const xv = a * (cosd(E) - e), yv = a * Math.sqrt(1 - e * e) * sind(E);
  const v = atan2d(yv, xv), r = Math.sqrt(xv * xv + yv * yv);
  const xh = r * (cosd(N) * cosd(v + w) - sind(N) * sind(v + w) * cosd(i));
  const yh = r * (sind(N) * cosd(v + w) + cosd(N) * sind(v + w) * cosd(i));
  const zh = r * (sind(v + w) * sind(i));
  let lon = atan2d(yh, xh), lat = atan2d(zh, Math.sqrt(xh * xh + yh * yh));
  const Ls = sun.L, Ms = sun.M, Lm = rev(N + w + M), Mm = M;
  const Dm = rev(Lm - Ls), F = rev(Lm - N);
  lon += -1.274 * sind(Mm - 2 * Dm) + 0.658 * sind(2 * Dm) - 0.186 * sind(Ms)
       - 0.059 * sind(2 * Mm - 2 * Dm) - 0.057 * sind(Mm - 2 * Dm + Ms)
       + 0.053 * sind(Mm + 2 * Dm) + 0.046 * sind(2 * Dm - Ms)
       + 0.041 * sind(Mm - Ms) - 0.035 * sind(Dm) - 0.031 * sind(Mm + Ms)
       - 0.015 * sind(2 * F - 2 * Dm) + 0.011 * sind(Mm - 4 * Dm);
  lat += -0.173 * sind(F - 2 * Dm) - 0.055 * sind(Mm - F - 2 * Dm)
       - 0.046 * sind(Mm + F - 2 * Dm) + 0.033 * sind(F + 2 * Dm) + 0.017 * sind(2 * Mm + F);
  const rm = r - 0.58 * cosd(Mm - 2 * Dm) - 0.46 * cosd(2 * Dm);
  return {
    x: rm * cosd(lon) * cosd(lat), y: rm * sind(lon) * cosd(lat), z: rm * sind(lat),
    lon: rev(lon), r: rm
  };
}

function earthRotation(date, Ls) {
  const ut = date.getUTCHours() + date.getUTCMinutes() / 60
           + date.getUTCSeconds() / 3600 + date.getUTCMilliseconds() / 3.6e6;
  return rev(Ls + 180 + ut * 15);   // 그리니치 평균 항성시
}
function planetSpin(d, P) {
  return rev(d / (P.rotH / 24) * 360);   // 실제 자전주기 기반 (rotH 음수 = 역행)
}
function moonPhaseName(a) {
  const t = [[22.5, '삭(신월)'], [67.5, '초승달'], [112.5, '상현달'],
            [157.5, '차오르는 달'], [202.5, '보름달(망)'], [247.5, '기우는 달'],
            [292.5, '하현달'], [337.5, '그믐달']];
  for (const [lim, nm] of t) if (a < lim) return nm;
  return '삭(신월)';
}
function periodStr(P) {
  return P.periodYears < 1 ? P.periodDays.toFixed(1) + ' 일' : P.periodYears.toFixed(2) + ' 년';
}

// 특정 시각의 전체 상태
function computeState(date) {
  const d = dayNumber(date);
  const bodies = {};
  for (const P of PLANETS) {
    const h = planetHelio(d, P);
    bodies[P.key] = { helio: new THREE.Vector3(h.xh, h.zh, -h.yh), r: h.r, lon: h.lon };
  }
  const sun = sunLM(d);
  const m = moonPosition(d, sun);
  const sunGeoLon = rev(bodies.earth.lon + 180);
  const phaseAngle = rev(m.lon - sunGeoLon);
  return {
    date, d, bodies,
    moonGeo: new THREE.Vector3(m.x, m.z, -m.y),
    moonDistKm: m.r * EARTH_RADIUS_KM,
    rotDeg: earthRotation(date, sun.L),
    phaseAngle, illum: (1 - cosd(phaseAngle)) / 2, phaseName: moonPhaseName(phaseAngle)
  };
}

// 일심좌표(AU) → 화면좌표 (거리모드 반영)
let distMode = 'visual';
function sceneScale(vAU) {
  const L = vAU.length();
  if (L < 1e-9) return vAU.clone();
  const mag = distMode === 'visual' ? AU_UNITS * Math.pow(L, DIST_POW) : AU_UNITS * L;
  return vAU.clone().multiplyScalar(mag / L);
}

// ---------- 렌더러 / 씬 / 카메라 ----------
const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);
const MAXANISO = renderer.capabilities.getMaxAnisotropy();

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x01010a);
const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 80000);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.enablePan = false;
controls.rotateSpeed = 0.8;
controls.zoomSpeed = 0.9;
controls.minDistance = 0.4;
controls.maxDistance = 60000;

const sunLight = new THREE.PointLight(0xfff2da, 2.6, 0, 0);  // 거리감쇠 없음
scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x2a3358, 0.13));

const texLoader = new THREE.TextureLoader();
function loadColorTex(url, ok) {
  texLoader.load(url, t => { t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = MAXANISO; ok(t); },
    undefined, () => console.warn('텍스처 로드 실패:', url));
}
function loadDataTex(url, ok) {
  texLoader.load(url, t => { t.anisotropy = MAXANISO; ok(t); },
    undefined, () => console.warn('텍스처 로드 실패:', url));
}

// ---------- 절차적 텍스처 ----------
function canvasTex(c) { const t = new THREE.CanvasTexture(c); t.colorSpace = THREE.SRGBColorSpace; t.anisotropy = MAXANISO; return t; }

function makeSunTexture() {
  const w = 1024, h = 512, c = document.createElement('canvas');
  c.width = w; c.height = h; const x = c.getContext('2d');
  x.fillStyle = '#ff7714'; x.fillRect(0, 0, w, h);
  for (let k = 0; k < 340; k++) {
    const cx = Math.random() * w, cy = Math.random() * h, r = 8 + Math.random() * 46;
    const col = Math.random() > .5 ? '255,214,90' : '226,70,8';
    const g = x.createRadialGradient(cx, cy, 0, cx, cy, r);
    g.addColorStop(0, `rgba(${col},.55)`); g.addColorStop(1, `rgba(${col},0)`);
    x.fillStyle = g; x.beginPath(); x.arc(cx, cy, r, 0, 6.283); x.fill();
  }
  return canvasTex(c);
}
function makeGlowTexture() {
  const s = 256, c = document.createElement('canvas');
  c.width = c.height = s; const x = c.getContext('2d');
  const g = x.createRadialGradient(s / 2, s / 2, 0, s / 2, s / 2, s / 2);
  g.addColorStop(0, 'rgba(255,230,150,.9)'); g.addColorStop(.25, 'rgba(255,170,60,.45)');
  g.addColorStop(.6, 'rgba(255,120,30,.12)'); g.addColorStop(1, 'rgba(255,120,30,0)');
  x.fillStyle = g; x.fillRect(0, 0, s, s);
  return canvasTex(c);
}
// 가스행성 — 가로 줄무늬
function makeBandedTexture(P) {
  const w = 512, h = 256, c = document.createElement('canvas');
  c.width = w; c.height = h; const x = c.getContext('2d');
  const pal = P.palette;
  for (let y = 0; y < h;) {
    const bh = 5 + Math.random() * 22;
    x.fillStyle = pal[Math.random() * pal.length | 0];
    x.fillRect(0, y, w, bh + 1); y += bh;
  }
  for (let k = 0; k < 60; k++) {                 // 난류 얼룩
    x.globalAlpha = 0.12; x.fillStyle = pal[Math.random() * pal.length | 0];
    x.beginPath();
    x.ellipse(Math.random() * w, Math.random() * h, 18 + Math.random() * 40, 5 + Math.random() * 12, 0, 0, 6.283);
    x.fill();
  }
  x.globalAlpha = 1;
  if (P.redSpot) {                               // 목성 대적점
    x.fillStyle = '#b5471f';
    x.beginPath(); x.ellipse(w * 0.62, h * 0.63, 32, 16, 0, 0, 6.283); x.fill();
    x.fillStyle = '#d98a5f';
    x.beginPath(); x.ellipse(w * 0.62, h * 0.63, 18, 9, 0, 0, 6.283); x.fill();
  }
  return canvasTex(c);
}
// 암석행성 — 베이스색 + 얼룩 + 크레이터
function makeRockyTexture(P) {
  const w = 512, h = 256, c = document.createElement('canvas');
  c.width = w; c.height = h; const x = c.getContext('2d');
  const base = new THREE.Color(P.color);
  x.fillStyle = '#' + base.getHexString(); x.fillRect(0, 0, w, h);
  for (let k = 0; k < 150; k++) {
    const cc = base.clone();
    cc.offsetHSL(0, (Math.random() - .5) * .1, (Math.random() - .5) * .4);
    x.fillStyle = `rgba(${cc.r * 255 | 0},${cc.g * 255 | 0},${cc.b * 255 | 0},${.3 + Math.random() * .4})`;
    x.beginPath();
    x.ellipse(Math.random() * w, Math.random() * h, 4 + Math.random() * 26, 4 + Math.random() * 22, 0, 0, 6.283);
    x.fill();
  }
  for (let k = 0; k < 70; k++) {                 // 크레이터
    x.strokeStyle = 'rgba(0,0,0,.22)'; x.lineWidth = 1;
    x.beginPath(); x.arc(Math.random() * w, Math.random() * h, 2 + Math.random() * 9, 0, 6.283); x.stroke();
  }
  return canvasTex(c);
}
function makeEarthFallbackTexture() {       // 실측 텍스처 로드 전/실패 시 대체
  const w = 1024, h = 512, c = document.createElement('canvas');
  c.width = w; c.height = h; const x = c.getContext('2d');
  const g = x.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, '#0a2a55'); g.addColorStop(.5, '#13458a'); g.addColorStop(1, '#0a2a55');
  x.fillStyle = g; x.fillRect(0, 0, w, h);
  const greens = ['#2f6b34', '#3c7d3f', '#4f8a45', '#6b7d3a'];
  for (let k = 0; k < 13; k++) {
    const cx = Math.random() * w, cy = h * .2 + Math.random() * h * .6;
    for (let b = 0; b < 16; b++) {
      const a = Math.random() * 6.283, dist = Math.random() * 70;
      x.fillStyle = greens[Math.random() * greens.length | 0];
      x.beginPath();
      x.ellipse(cx + Math.cos(a) * dist, cy + Math.sin(a) * dist * .7, 16 + Math.random() * 30, 14 + Math.random() * 26, 0, 0, 6.283);
      x.fill();
    }
  }
  return canvasTex(c);
}
function makeRingTexture() {                 // 토성 고리
  const w = 256, h = 8, c = document.createElement('canvas');
  c.width = w; c.height = h; const x = c.getContext('2d');
  for (let i = 0; i < w; i++) {
    const t = i / w;
    let a = 0.55 + 0.4 * Math.sin(t * 40);
    a *= 0.7 + 0.3 * Math.random();
    if (t > 0.62 && t < 0.68) a *= 0.12;       // 카시니 간극
    if (t < 0.06 || t > 0.97) a *= 0.2;        // 가장자리 페이드
    a = Math.max(0, Math.min(1, a));
    const s = 180 + Math.random() * 55;
    x.fillStyle = `rgba(${s | 0},${s * .92 | 0},${s * .72 | 0},${a})`;
    x.fillRect(i, 0, 1, h);
  }
  return canvasTex(c);
}

// ---------- 별 배경 ----------
(function () {
  const N = 9000, R = 14000;
  const pos = new Float32Array(N * 3), col = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    const u = Math.random() * 2 - 1, th = Math.random() * 6.283, rr = Math.sqrt(1 - u * u);
    pos[i * 3] = R * rr * Math.cos(th); pos[i * 3 + 1] = R * u; pos[i * 3 + 2] = R * rr * Math.sin(th);
    const b = 0.6 + Math.random() * 0.4, tint = Math.random();
    let r = b, g = b, bl = b;
    if (tint < 0.15) { g = b * .85; bl = b * .7; } else if (tint < 0.3) { r = b * .7; g = b * .82; }
    col[i * 3] = r; col[i * 3 + 1] = g; col[i * 3 + 2] = bl;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
    size: 1.6, sizeAttenuation: false, vertexColors: true, transparent: true
  })));
})();

// ---------- 태양 ----------
const sunMesh = new THREE.Mesh(
  new THREE.SphereGeometry(SUN_RADIUS, 48, 32),
  new THREE.MeshBasicMaterial({ map: makeSunTexture() })
);
scene.add(sunMesh);
const glow = new THREE.Sprite(new THREE.SpriteMaterial({
  map: makeGlowTexture(), blending: THREE.AdditiveBlending, transparent: true, depthWrite: false
}));
glow.scale.setScalar(SUN_RADIUS * 4.2);
scene.add(glow);

// ---------- 행성 생성 ----------
const planetGeo = new THREE.SphereGeometry(1, 48, 32);
const earthGeo = new THREE.SphereGeometry(1, 64, 48);
const bodyObjs = {};

function buildPlanet(P) {
  const group = new THREE.Group();             // 공전 위치
  scene.add(group);
  const tilt = new THREE.Group();              // 자전축 기울기 (우주공간 고정)
  tilt.rotation.z = P.tilt * DEG;
  group.add(tilt);

  let mat, geo = planetGeo;
  if (P.style === 'earth') {
    geo = earthGeo;
    mat = new THREE.MeshStandardMaterial({ map: makeEarthFallbackTexture(), roughness: 0.9, metalness: 0.04 });
    // NASA 실측 텍스처 비동기 적용 (낮 표면 / 지형 노멀 / 야간 도시불빛)
    loadColorTex(TEX.earthDay, t => { mat.map = t; mat.needsUpdate = true; });
    loadDataTex(TEX.earthNormal, t => { mat.normalMap = t; mat.normalScale.set(0.85, 0.85); mat.needsUpdate = true; });
    loadColorTex(TEX.earthLights, t => {
      mat.emissiveMap = t; mat.emissive = new THREE.Color(0xffd9a0);
      mat.emissiveIntensity = 1.15; mat.needsUpdate = true;
    });
  } else if (P.style === 'gas') {
    mat = new THREE.MeshStandardMaterial({ map: makeBandedTexture(P), roughness: 1, metalness: 0 });
  } else {
    mat = new THREE.MeshStandardMaterial({ map: makeRockyTexture(P), roughness: 1, metalness: 0 });
  }
  const mesh = new THREE.Mesh(geo, mat);
  mesh.scale.setScalar(P.vRadius);
  tilt.add(mesh);

  const obj = { P, group, tilt, mesh };

  if (P.style === 'earth') {                   // 구름층 · 대기 · 자전축
    const cloudMat = new THREE.MeshStandardMaterial({
      color: 0xffffff, transparent: true, opacity: 0.92, depthWrite: false, roughness: 1
    });
    loadColorTex(TEX.earthClouds, t => { cloudMat.map = t; cloudMat.alphaMap = t; cloudMat.needsUpdate = true; });
    const clouds = new THREE.Mesh(earthGeo, cloudMat);
    clouds.scale.setScalar(P.vRadius * 1.012);
    tilt.add(clouds);
    obj.clouds = clouds;

    const atmo = new THREE.Mesh(earthGeo, new THREE.MeshBasicMaterial({
      color: 0x5b9bff, transparent: true, opacity: 0.16,
      side: THREE.BackSide, blending: THREE.AdditiveBlending, depthWrite: false
    }));
    atmo.scale.setScalar(P.vRadius * 1.16);
    tilt.add(atmo);

    const axis = new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(0, -1.9, 0), new THREE.Vector3(0, 1.9, 0)]),
      new THREE.LineBasicMaterial({ color: 0x66ccff, transparent: true, opacity: 0.55 }));
    axis.scale.setScalar(P.vRadius);
    tilt.add(axis);
  }

  if (P.ring) {                                // 토성 고리
    const inner = 1.4, outer = 2.35;
    const rg = new THREE.RingGeometry(inner, outer, 96, 1);
    const rp = rg.attributes.position, ru = rg.attributes.uv, tmp = new THREE.Vector3();
    for (let k = 0; k < rp.count; k++) {       // UV를 반지름 방향으로 재매핑
      tmp.fromBufferAttribute(rp, k);
      ru.setXY(k, (tmp.length() - inner) / (outer - inner), 1);
    }
    const ring = new THREE.Mesh(rg, new THREE.MeshBasicMaterial({
      map: makeRingTexture(), side: THREE.DoubleSide, transparent: true, depthWrite: false
    }));
    ring.rotation.x = Math.PI / 2;
    ring.scale.setScalar(P.vRadius);
    tilt.add(ring);
  }

  bodyObjs[P.key] = obj;
  return obj;
}
for (const P of PLANETS) buildPlanet(P);

// ---------- 달 ----------
const moonMat = new THREE.MeshStandardMaterial({ roughness: 1, metalness: 0, color: 0x999999 });
loadColorTex(TEX.moon, t => { moonMat.map = t; moonMat.color.set(0xffffff); moonMat.needsUpdate = true; });
const moonMesh = new THREE.Mesh(planetGeo, moonMat);
moonMesh.scale.setScalar(0.62);
bodyObjs.earth.group.add(moonMesh);

// ---------- 궤도선 ----------
const orbitMat = new THREE.LineBasicMaterial({ color: 0x6a7388, transparent: true, opacity: 0.5 });
const orbitObjs = [];
const orbitEpoch = dayNumber(new Date());
function sampleOrbit(P) {
  const steps = Math.max(96, Math.min(360, Math.round(P.periodDays / 4)));
  const raw = [];
  for (let k = 0; k < steps; k++) {
    const h = planetHelio(orbitEpoch + k / steps * P.periodDays, P);
    raw.push(new THREE.Vector3(h.xh, h.zh, -h.yh));
  }
  return raw;
}
for (const P of PLANETS) {
  const raw = sampleOrbit(P);
  const geo = new THREE.BufferGeometry().setFromPoints(raw.map(sceneScale));
  const line = new THREE.LineLoop(geo, orbitMat);
  scene.add(line);
  orbitObjs.push({ raw, line });
}
// 달 궤도 (지구 기준)
const moonOrbitGroup = new THREE.Group();
moonOrbitGroup.scale.setScalar(MOON_DIST_FACTOR);
bodyObjs.earth.group.add(moonOrbitGroup);
(function () {
  const raw = [];
  for (let k = 0; k < 180; k++) {
    const dd = orbitEpoch + k / 180 * 27.32166;
    const m = moonPosition(dd, sunLM(dd));
    raw.push(new THREE.Vector3(m.x, m.z, -m.y));
  }
  moonOrbitGroup.add(new THREE.LineLoop(
    new THREE.BufferGeometry().setFromPoints(raw),
    new THREE.LineBasicMaterial({ color: 0x8a8a9c, transparent: true, opacity: 0.5 })));
})();
function rebuildOrbits() {
  for (const o of orbitObjs) {
    const arr = o.line.geometry.attributes.position.array;
    for (let k = 0; k < o.raw.length; k++) {
      const p = sceneScale(o.raw[k]);
      arr[k * 3] = p.x; arr[k * 3 + 1] = p.y; arr[k * 3 + 2] = p.z;
    }
    o.line.geometry.attributes.position.needsUpdate = true;
    o.line.geometry.computeBoundingSphere();
  }
}

// ---------- 상태 / 모드 ----------
let paused = false, orbitsVisible = true, focusKey = 'earth';
let simTime = Date.now();
const SPEEDS = [-31557600, -2629800, -604800, -86400, -3600, -60, -1,
                1, 60, 3600, 86400, 604800, 2629800, 31557600];
let speedIndex = SPEEDS.indexOf(1);
const prevFocus = new THREE.Vector3();

function updateScene(st) {
  for (const P of PLANETS) {
    const o = bodyObjs[P.key];
    o.group.position.copy(sceneScale(st.bodies[P.key].helio));
    o.mesh.rotation.y = (P.key === 'earth' ? st.rotDeg : planetSpin(st.d, P)) * DEG;
  }
  const eo = bodyObjs.earth;
  if (eo.clouds) eo.clouds.rotation.y = (st.rotDeg + st.d * 3) * DEG;  // 구름 약간 드리프트
  moonMesh.position.copy(st.moonGeo).multiplyScalar(MOON_DIST_FACTOR);
  moonMesh.lookAt(eo.group.position);                                  // 조석 고정
}

// 초점 천체의 화면 좌표
const _v = new THREE.Vector3();
function focusWorldPos(out) {
  if (focusKey === 'moon') return moonMesh.getWorldPosition(out);
  if (focusKey === 'sun' || focusKey === 'system') return out.set(0, 0, 0);
  return out.copy(bodyObjs[focusKey].group.position);
}
function focusRadius() {
  if (focusKey === 'sun') return SUN_RADIUS;
  if (focusKey === 'moon') return 0.62;
  if (focusKey === 'system') return 0;
  return bodyObjs[focusKey].P.vRadius;
}
function frameView() {
  focusWorldPos(prevFocus);
  controls.target.copy(prevFocus);
  if (focusKey === 'system') {
    const far = (bodyObjs.neptune.group.position.length() || 500) * 1.35;
    camera.position.set(far * 0.05, far * 0.62, far * 1.05);
  } else {
    let r = focusRadius() * 7 + 4;
    if (focusKey === 'earth') r = Math.max(r, MOON_DIST_FACTOR * 60 * 1.7);
    if (focusKey === 'saturn') r *= 1.5;
    camera.position.set(prevFocus.x + r * 0.35, prevFocus.y + r * 0.5, prevFocus.z + r * 1.35);
  }
}

// ---------- HUD ----------
const $ = id => document.getElementById(id);
function speedLabel(v) {
  const a = Math.abs(v); let s;
  if (a === 1) s = '실시간 (1×)';
  else if (a < 60) s = a + '×';
  else if (a < 3600) s = (a / 60) + '분/초';
  else if (a < 86400) s = (a / 3600) + '시간/초';
  else if (a < 604800) s = (a / 86400) + '일/초';
  else if (a < 2629800) s = (a / 604800) + '주/초';
  else if (a < 31557600) s = Math.round(a / 2629800) + '개월/초';
  else s = (a / 31557600) + '년/초';
  return (v < 0 ? '◀역행 ' : '') + s;
}
let lastHud = 0;
function updateHUD(st, now) {
  if (now - lastHud < 120) return;
  lastHud = now;
  $('hudLocal').textContent = st.date.toLocaleString('ko-KR', { dateStyle: 'medium', timeStyle: 'medium' });
  $('hudUTC').textContent = st.date.toISOString().replace('T', ' ').slice(0, 19);
  $('hudSpeed').textContent = paused ? '⏸ 일시정지' : speedLabel(SPEEDS[speedIndex]);
  let fname, dist, per;
  if (focusKey === 'system') { fname = '태양계 전체 (행성 8)'; dist = '—'; per = '—'; }
  else if (focusKey === 'sun') { fname = '태양 (중심별)'; dist = '0 AU'; per = '—'; }
  else if (focusKey === 'moon') { fname = '달 (지구의 위성)'; dist = st.bodies.earth.r.toFixed(3) + ' AU'; per = '27.32 일'; }
  else { const P = bodyObjs[focusKey].P; fname = P.name; dist = st.bodies[focusKey].r.toFixed(3) + ' AU'; per = periodStr(P); }
  $('hudFocus').textContent = fname;
  $('hudDist').textContent = dist;
  $('hudPeriod').textContent = per;
  $('hudRot').textContent = st.rotDeg.toFixed(1) + '°';
  $('hudPhase').textContent = st.phaseName + ' · ' + Math.round(st.illum * 100) + '%';
  $('hudEM').textContent = Math.round(st.moonDistKm).toLocaleString('ko-KR') + ' km';
}

// ---------- UI ----------
const FOCUS_LIST = [
  ['system', '🌌 태양계 전체'], ['sun', '☀ 태양'], ['mercury', '수성'], ['venus', '금성'],
  ['earth', '🌍 지구'], ['moon', '🌙 달'], ['mars', '화성'], ['jupiter', '목성'],
  ['saturn', '토성'], ['uranus', '천왕성'], ['neptune', '해왕성']
];
const focusSel = $('focusSel');
for (const [key, label] of FOCUS_LIST) {
  const op = document.createElement('option');
  op.value = key; op.textContent = label;
  if (key === 'earth') op.selected = true;
  focusSel.appendChild(op);
}
focusSel.onchange = () => { focusKey = focusSel.value; frameView(); };

function changeSpeed(d) { speedIndex = Math.min(SPEEDS.length - 1, Math.max(0, speedIndex + d)); }
function togglePause() {
  paused = !paused;
  $('btnPause').textContent = paused ? '▶ 재생' : '⏸ 정지';
  $('btnPause').classList.toggle('on', paused);
}
$('btnSlower').onclick = () => changeSpeed(-1);
$('btnFaster').onclick = () => changeSpeed(1);
$('btnPause').onclick = togglePause;
$('btnRealtime').onclick = () => { speedIndex = SPEEDS.indexOf(1); };
$('btnNow').onclick = () => { simTime = Date.now(); speedIndex = SPEEDS.indexOf(1); if (paused) togglePause(); };
$('btnScale').onclick = () => {
  distMode = distMode === 'visual' ? 'real' : 'visual';
  $('btnScale').textContent = distMode === 'visual' ? '📐 거리: 시각화' : '📐 거리: 실제비율';
  rebuildOrbits();
  updateScene(computeState(new Date(simTime)));
  frameView();
};
$('btnOrbit').onclick = () => {
  orbitsVisible = !orbitsVisible;
  for (const o of orbitObjs) o.line.visible = orbitsVisible;
  moonOrbitGroup.visible = orbitsVisible;
  $('btnOrbit').textContent = orbitsVisible ? '🛰 궤도 켬' : '🛰 궤도 끔';
  $('btnOrbit').classList.toggle('on', orbitsVisible);
};
$('btnView').onclick = frameView;
addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); togglePause(); }
  else if (e.code === 'ArrowRight') changeSpeed(1);
  else if (e.code === 'ArrowLeft') changeSpeed(-1);
  else if (e.key === 'r' || e.key === 'R') frameView();
});
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ---------- 초기화 & 루프 ----------
updateScene(computeState(new Date(simTime)));
$('btnOrbit').classList.add('on');
frameView();

let prevT = performance.now();
function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  let dt = (now - prevT) / 1000; prevT = now;
  if (dt > 0.1) dt = 0.1;
  if (!paused) simTime += dt * 1000 * SPEEDS[speedIndex];

  const st = computeState(new Date(simTime));
  updateScene(st);

  focusWorldPos(_v);                       // 초점 천체 추적 (고배속에서도 시야 유지)
  const mv = _v.clone().sub(prevFocus);
  camera.position.add(mv);
  controls.target.add(mv);
  prevFocus.copy(_v);

  controls.update();
  renderer.render(scene, camera);
  updateHUD(st, now);
}

$('loading').remove();
animate();

} catch (err) {
  const el = document.getElementById('loading');
  if (el) {
    el.classList.add('error');
    el.innerHTML = '<p>⚠ 실행에 실패했습니다.</p>'
      + '<p class="sub">' + (err && err.message ? err.message : err) + '</p>'
      + '<p class="sub">인터넷 연결을 확인하거나, 폴더에서 로컬 서버로 열어보세요.</p>';
  }
  console.error(err);
}
